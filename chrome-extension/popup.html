<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QuickSend AI</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

<div class="container">

    <header>
        <h1>🚀 QuickSend AI</h1>
        <p>Your Amazon Wholesale Research Assistant</p>
    </header>

    <nav class="tabs">
        <button class="tab active">Dashboard</button>
        <button class="tab">Product</button>
        <button class="tab">Mission</button>
        <button class="tab">Suppliers</button>
        <button class="tab">Settings</button>
    </nav>

<section class="card">

    <h2>Mission Center</h2>

    <label>Mission Type</label>
    <select id="missionType">
        <option value="find_suppliers">Find Suppliers</option>
        <option value="research_brand">Research Brand</option>
        <option value="verify_supplier">Verify Supplier</option>
        <option value="open_wholesale_account">Open Wholesale Account</option>
        <option value="generate_email">Generate Outreach Email</option>
    </select>

    <label>Target Country</label>
    <input id="targetCountry" value="United States" placeholder="United States, Germany, UAE, Canada..." />

    <label>Mission Notes</label>
    <textarea id="missionNotes" placeholder="Example: Find wholesalers and distributors carrying this brand."></textarea>

    <button id="startMission">
        Start Mission
    </button>

</section>

    <section class="card">

        <h2>Current Amazon Product</h2>

        <div id="productCard">

            Waiting for product...

        </div>

    </section>

    <section class="card">

        <h2>AI Recommendations</h2>

        <div id="recommendations">

            No recommendations yet.

        </div>

    </section>

    <section class="card">

        <h2>Mission Progress</h2>

        <ul>

            <li>Waiting...</li>

        </ul>

    </section>

</div>

<script src="popup.js"></script>

</body>
</html>
