<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Amazon Wholesale AI Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h2>Amazon Wholesale AI Assistant</h2>
  <p class="phase">Phase 1: Amazon Product Extractor</p>

  <button id="extractBtn">Extract Product Data</button>
  <button id="saveBtn">Save Lead</button>
  <button id="exportBtn">Export CSV</button>
  <button id="clearBtn" class="danger">Clear Saved Leads</button>

  <div id="status"></div>

  <div class="section">
    <h3>Product Data</h3>

    <div class="image-wrap">
      <img id="mainImage" src="" />
    </div>

    <p><b>Brand:</b> <span id="brand">-</span></p>
    <p><b>ASIN:</b> <span id="asin">-</span></p>
    <p><b>Title:</b> <span id="title">-</span></p>
    <p><b>Price:</b> <span id="price">-</span></p>
    <p><b>Category:</b> <span id="category">-</span></p>
    <p><b>Seller:</b> <span id="seller">-</span></p>
    <p><b>URL:</b> <a id="url" href="#" target="_blank">-</a></p>
  </div>

  <div class="section">
    <h3>Research Notes</h3>
    <label>Official brand website</label>
    <input id="brandWebsite" placeholder="https://brand.com" />

    <label>Notes</label>
    <textarea id="notes" placeholder="Supplier notes, restrictions, invoice info, etc."></textarea>
  </div>

  <div class="section">
    <h3>Saved Leads</h3>
    <p><b>Total saved:</b> <span id="leadCount">0</span></p>
  </div>

  <details>
    <summary>Debug extracted data</summary>
    <pre id="debug">{}</pre>
  </details>

  <script src="popup.js"></script>
</body>
</html>
